<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Blocks</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <h1 class="title">NEON BLOCKS</h1>
                <div class="score-card high-score">
                    <span class="label">BEST</span>
                    <span id="best-score" class="value">0</span>
                </div>
            </div>
            <div id="score-popup" class="hidden"></div>
        </header>

        <div class="utility-bar">
            <div id="hold-box" class="hold-box locked">
                <span class="box-label">HOLD</span>
                <div id="held-piece-container"></div>
                <div class="lock-overlay">
                    <span class="lock-icon">🔒</span>
                    <span class="lock-text">5k</span>
                </div>
            </div>
            <div class="header-icons">
                <button id="leaderboard-btn" class="top-btn" title="Leaderboard">🏆</button>
                <button id="mute-btn" class="top-btn" title="Toggle Sound">🎵</button>
            </div>
            <button id="shuffle-btn" class="shuffle-btn locked" disabled>
                <span class="icon">🔄</span>
                <div class="lock-overlay">
                    <span class="lock-icon">🔒</span>
                    <span class="lock-text">20k</span>
                </div>
            </button>
        </div>

        <main>
            <div id="grid" class="grid"></div>
        </main>

        <footer>
            <div id="pieces-tray" class="pieces-tray"></div>
        </footer>

        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>No more moves available.</p>
                <div class="final-score">
                    <span>Score: </span>
                    <span id="final-score-value">0</span>
                </div>
                <div id="name-input-container" class="hidden">
                    <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="15" autocomplete="off">
                </div>
                <button id="restart-btn" style="margin-top: 15px;">Try Again</button>
            </div>
        </div>

        <div id="leaderboard-modal" class="modal hidden">
            <div class="modal-content leaderboard-content">
                <h2>Leaderboard</h2>
                <div class="leaderboard-list">
                    <ul id="leaderboard-ul">
                        <li>Loading scores...</li>
                    </ul>
                </div>
                <button id="close-leaderboard-btn" style="margin-top: 20px;">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Drag overlay to render dragging elements -->
    <div id="drag-overlay"></div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="main.js"></script>
</body>
</html>
